<!DOCTYPE html>
<html lang="en">
<head>

    <title>Weather-app</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <select name="" id="country" onchange="updateCities()">

    <select name="" id="city">

    </select>
    <button onclick="getWeather()">Get Weather</button>

    <script src="index.js"></script>
